name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check:ci

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

  test:
    name: Test
    runs-on: ubuntu-latest
    # Self-contained Postgres service (no Neon secrets). Mirrors the local dev
    # container: plain postgres:17-alpine, same neon/npg/neondb creds, no SSL.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: neon
          POSTGRES_PASSWORD: npg
          POSTGRES_DB: neondb
        ports:
          - 14620:5432
        options: >-
          --health-cmd "pg_isready -U neon -d neondb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://neon:npg@localhost:14620/neondb
      BETTER_AUTH_URL: http://localhost:14600
      # CI-only dummy (32+ chars); real secret is set per-environment in Vercel.
      BETTER_AUTH_SECRET: ci-dummy-secret-not-used-in-prod-0000000000
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Apply migrations
        run: bun run db:migrate
      - name: Run tests
        run: bun run test
